name: Build GoShield Builder

on:
  
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击运行

jobs:
  build-windows:
    name: Build Builder on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true # 启用 Go 模块缓存，加速二次编译

    - name: Build Builder Executable
      run: |
        mkdir build
        # 编译 Builder，并使用 -ldflags "-s -w" 剥离调试信息以大幅减小体积
        go build -ldflags "-s -w" -o build/Builder.exe ./cmd/builder

    - name: Upload Builder Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoShield-Builder
        path: build/Builder.exe
        compression-level: 6
