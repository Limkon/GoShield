# 文件路径: .github/workflows/release.yml
name: Build GoShield GUI Builder

on:
  workflow_dispatch:
  
jobs:
  build-windows:
    name: Build Builder on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.20'
        cache: true

    - name: Install UI Dependencies & Prepare Manifest
      run: |
        New-Item -ItemType File -Force -Path internal/compiler/stub_base.exe
        go get golang.org/x/sys@v0.18.0
        go get github.com/lxn/walk
        go mod tidy
        go install github.com/akavel/rsrc@latest
        echo '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0"><assemblyIdentity version="1.0.0.0" processorArchitecture="*" name="Builder" type="win32"/><dependency><dependentAssembly><assemblyIdentity type="win32" name="Microsoft.Windows.Common-Controls" version="6.0.0.0" processorArchitecture="*" publicKeyToken="6595b64144ccf1df" language="*"/></dependentAssembly></dependency></assembly>' > cmd/builder/builder.manifest
        
        if (!(Test-Path -Path "cmd/builder/app.ico")) {
            Write-Host "app.ico 缺失，本地生成..."
            $icoBase64 = "AAABAAEAAQEAAAEAIAAwAAAAFgAAACgAAAABAAAAAgAAAAEAIAAAAAAACAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
            [System.IO.File]::WriteAllBytes("cmd/builder/app.ico", [System.Convert]::FromBase64String($icoBase64))
        }
        
        rsrc -manifest cmd/builder/builder.manifest -ico cmd/builder/app.ico -o cmd/builder/rsrc.syso

    - name: Build GoShield (Two-Step Compilation)
      run: |
        mkdir build
        
        echo "1. 正在强制获取最新代码所需的所有依赖..."
        # 🌟 终极防丢补丁：在执行 go build 前的一瞬间，强制贴脸拉取 winio 库！
        go get github.com/microsoft/go-winio
        go mod tidy
        
        echo "2. 正在编译底层防御外壳 (Stub)..."
        cp cmd/builder/rsrc.syso stub/rsrc.syso
        go build -ldflags "-s -w -H=windowsgui" -o internal/compiler/stub_base.exe ./stub
        
        echo "3. 正在编译加壳机主程序 (Builder)..."
        go build -ldflags "-s -w -H=windowsgui" -o build/Builder.exe ./cmd/builder

    - name: Package Release Files
      run: |
        mkdir release
        cp build/Builder.exe release/

    - name: Upload GUI Release
      uses: actions/upload-artifact@v4
      with:
        name: GoShield-Release
        path: release/
        compression-level: 6
