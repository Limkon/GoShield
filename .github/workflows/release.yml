name: Build GoShield GUI Builder

on:
  workflow_dispatch: # 允许在 Actions 页面手动触发运行

jobs:
  build-windows:
    name: Build Builder on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.20' # 严格锁定 1.20，确保最终壳在 Win7 上完美运行
        cache: true

    - name: Install UI Dependencies & Prepare Manifest
      run: |
        # 1. 强制降级并锁定底层 sys 库为兼容 Go 1.20 的老版本，解决编译冲突
        go get golang.org/x/sys@v0.18.0
        
        # 2. 下载 walk UI 库并整理依赖
        go get github.com/lxn/walk
        go mod tidy
        
        # 3. 安装 rsrc 工具，用于生成 Windows 原生窗口外观的清单文件
        go install github.com/akavel/rsrc@latest
        echo '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0"><assemblyIdentity version="1.0.0.0" processorArchitecture="*" name="Builder" type="win32"/><dependency><dependentAssembly><assemblyIdentity type="win32" name="Microsoft.Windows.Common-Controls" version="6.0.0.0" processorArchitecture="*" publicKeyToken="6595b64144ccf1df" language="*"/></dependentAssembly></dependency></assembly>' > cmd/builder/builder.manifest
        rsrc -manifest cmd/builder/builder.manifest -o cmd/builder/rsrc.syso

    - name: Build GUI Builder Executable (Two-Step Build)
      run: |
        mkdir build
        
        # 第一步：预编译基础外壳 (Stub Base)
        # 将编译产物输出到 internal/compiler/ 目录，以便后续的 go:embed 指令能抓取到它
        go build -ldflags "-s -w -H=windowsgui" -o internal/compiler/stub_base.exe ./stub
        
        # 第二步：编译完全独立的加壳机主程序 (Builder)
        # 此时编译器会自动把刚生成的 stub_base.exe 转换为字节流打包进 Builder 中
        go build -ldflags "-s -w -H=windowsgui" -o build/Builder_Standalone.exe ./cmd/builder

    - name: Package Release Files
      run: |
        # 架构重构红利：现在只需要发布这一个独立的 .exe 文件即可！
        mkdir release
        cp build/Builder_Standalone.exe release/

    - name: Upload GUI Release
      uses: actions/upload-artifact@v4
      with:
        name: GoShield-GUI-Release
        path: release/
        compression-level: 6
